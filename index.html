<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <title>ALICARI | Diseño Multimedia, UX/UI & Branding</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Portal y portfolio profesional de alicari. Proyectos de diseño multimedia, UX/UI y branding.">
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./style.css">

    <!-- Schema Structured Data (FAQPage & ProfessionalService) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué servicios de diseño y desarrollo web ofrece alicari.com.ar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ofrezco servicios integrales de Diseño UX/UI, Desarrollo Front-End, branding corporativo y producción multimedia. Me especializo en la creación de interfaces optimizadas, maquetación ágil en HTML/CSS y activos digitales enfocados en la experiencia de usuario."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuál es la diferencia entre el diseño UX y UI en un sitio web?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El diseño UX se enfoca en la lógica, usabilidad y estructura del sitio para que la navegación sea intuitiva. El diseño UI se encarga de la identidad visual: tipografías, colores y la estética final de los componentes. Ambos garantizan que una web sea atractiva y funcional."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo ayuda el diseño UX/UI a mejorar las conversiones?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mejora las conversiones eliminando fricciones en la navegación, estructurando la información mediante jerarquías claras, optimizando formularios y diseñando llamadas a la acción (CTAs) estratégicas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué tecnologías y herramientas se utilizan para el desarrollo web?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Utilizo maquetación limpia basada en HTML5, CSS3, JavaScript y entornos profesionales de diseño y prototipado como Figma, asegurando una transición fluida desde el layout visual hasta el código final."
          }
        }
      ]
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Alicari - Diseño Multimedia & UX/UI",
      "url": "https://alicari.com.ar",
      "logo": "https://alicari.com.ar/logo.png",
      "image": "https://alicari.com.ar/og-image.png",
      "description": "Servicios profesionales de Diseño UX/UI, Desarrollo Front-End y Soluciones Multimedia.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Buenos Aires",
        "addressCountry": "AR"
      }
    }
    </script>
  </head>
    
  <body>
    <!-- Fondo animado de círculos -->
    <div class="ripple-background">
      <div class="circle xxlarge shade1"></div>
      <div class="circle xlarge shade2"></div>
      <div class="circle large shade3"></div>
      <div class="circle medium shade4"></div>
      <div class="circle small shade5"></div>
    </div>
    
    <!-- Contenedor principal con efecto glassmorphism -->
    <main class="profile-card">
      <header class="profile-header">
        <!-- Logo en formato SVG -->
        <h1 class="logo">
          <img src="logo-alicari-04-04.svg" alt="ALICARI" class="logo-img">
        </h1>
        <p class="subtitle">Diseño Multimedia · UX/UI · Branding</p>
      </header>

      <!-- Enlaces principales y de redes -->
      <div class="profile-links">
        <a href="./next/index.html" class="btn btn-portfolio">
          <span>Ver Portfolio</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </a>
        
        <div class="social-grid">
          <a href="https://behance.net/alicari" target="_blank" rel="noopener" class="social-item" title="Behance">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 10H7v-3h2a1.5 1.5 0 0 1 0 3zM9 15H7v-3.5h2a1.75 1.75 0 0 1 0 3.5zM4 5h5a3.5 3.5 0 0 1 0 7 3.75 3.75 0 0 1 0 7.5H4V5z"/>
              <path d="M19 14h-4a1.75 1.75 0 0 0 3.5 0M15 11.5a2.5 2.5 0 0 1 5 0V14h-5z"/>
              <line x1="15" y1="8" x2="20" y2="8" stroke-width="2"/>
            </svg>
            <span>Behance</span>
          </a>



          <a href="https://linkedin.com/in/alicari/" target="_blank" rel="noopener" class="social-item" title="LinkedIn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
              <rect x="2" y="9" width="4" height="12"></rect>
              <circle cx="4" cy="4" r="2"></circle>
            </svg>
            <span>LinkedIn</span>
          </a>

          <a href="#" id="email-btn" class="social-item" title="Contacto">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <span>Email</span>
          </a>
        </div>
      </div>
    </main>

    <!-- Modal de Contacto -->
    <div id="contact-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
      <div class="modal-card">
        <button id="close-modal" class="modal-close-btn" aria-label="Cerrar modal">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        
        <h2 id="modal-title" class="modal-title">Enviar Mensaje</h2>
        <p class="modal-subtitle">Escríbeme y me pondré en contacto contigo a la brevedad.</p>
        
        <form action="https://formsubmit.co/licari.multimedios@gmail.com" method="POST" class="contact-form">
          <!-- Configuración de FormSubmit -->
          <input type="text" name="_honey" style="display:none"> <!-- Filtro de Spam -->
          <input type="hidden" name="_template" value="table">
          <input type="hidden" name="_captcha" value="false">
          
          <div class="form-group">
            <label for="form-name">Nombre</label>
            <input type="text" id="form-name" name="name" required placeholder="Tu nombre">
          </div>
          
          <div class="form-group">
            <label for="form-email">Email</label>
            <input type="email" id="form-email" name="email" required placeholder="tu@email.com">
          </div>
          
          <div class="form-group">
            <label for="form-message">Mensaje</label>
            <textarea id="form-message" name="message" rows="4" required placeholder="¿En qué puedo ayudarte?"></textarea>
          </div>
          
          <button type="submit" class="btn btn-submit">Enviar Correo</button>
        </form>
      </div>
    </div>

    <!-- Script para controlar el modal -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const emailBtn = document.getElementById('email-btn');
        const modal = document.getElementById('contact-modal');
        const closeBtn = document.getElementById('close-modal');

        if (emailBtn && modal && closeBtn) {
          // Abrir modal
          emailBtn.addEventListener('click', (e) => {
            e.preventDefault();
            modal.classList.add('is-active');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
          });

          // Cerrar modal
          const closeModal = () => {
            modal.classList.remove('is-active');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
          };

          closeBtn.addEventListener('click', closeModal);

          // Cerrar haciendo click en el overlay
          modal.addEventListener('click', (e) => {
            if (e.target === modal) {
              closeModal();
            }
          });

          // Cerrar con tecla ESC
          document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('is-active')) {
              closeModal();
            }
          });
        }
      });
    </script>
  </body>
</html>
